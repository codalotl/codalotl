---
agents:
  - name: generic
    prompts:
      - name: base
    tools:
      - read_file
      - ls
      - edit_files
      - shell
      - update_plan
    mode: generic
    skills: true
  - name: package_mode_no_context
    prompts:
      - name: package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - update_plan
      - diagnostics
      - fix_lints
      - run_tests
      - run_project_tests
      - module_info
      - get_public_api
      - clarify_public_api
      - get_usage
      - update_usage
      - change_api
    mode: package
    skills: true
  - name: package_mode_default_context
    prompts:
      - name: package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - update_plan
      - diagnostics
      - fix_lints
      - run_tests
      - run_project_tests
      - module_info
      - get_public_api
      - clarify_public_api
      - get_usage
      - update_usage
      - change_api
    mode: package
    include_package_mode_context: true
    skills: true
  - name: limited_package_mode
    prompts:
      - name: limited-package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - diagnostics
      - fix_lints
      - run_tests
      - get_public_api
      - clarify_public_api
    mode: package
    include_package_mode_context: true
    skills: true
  - name: pr-orchestrator
    prompts:
      - name: base
      - file: pr-orchestrator.prompt.md
    tools:
      - read_file
      - ls
      - shell
      - edit_files
      - update_plan
      - review
      - implement
    mode: generic
    skills: true
  - name: pr-review
    prompts:
      - file: review.prompt.md
    tools:
      - read_file
      - ls
      - shell
    mode: generic
    skills: false
  
tools:
  - name: review
    description: |
      Reviews changes made vs some branch, and returns raw JSON findings plus an overall correctness verdict.
    parameters:
      base:
        type: string
        description: Branch to review against, often main or master.
        required: true
    subagent:
      name: pr-review
      result_format: json
      messages:
        - text: |
            Review the current branch against base ref `{{ .base }}`.

            Sandbox root: `{{ .sandbox_dir }}`.

            When you report a finding, `code_location.absolute_file_path` must be an absolute path under this sandbox. Diff paths are repo-relative, so join them to `{{ .sandbox_dir }}` when filling that field.

            The next messages contain, in order:
            1. Commit log since `{{ .base }}`.
            2. Diff stat vs `{{ .base }}`.
            3. Full diff vs `{{ .base }}`.

            Only report actionable bugs introduced by this diff. Return JSON that exactly matches your schema.
        - command:
            cmd: git
            args:
              - log
              - --oneline
              - --decorate
              - "{{ .base }}..HEAD"
        - command:
            cmd: git
            args:
              - diff
              - --stat
              - --find-renames
              - "{{ .base }}...HEAD"
        - command:
            cmd: git
            args:
              - diff
              - --find-renames
              - --submodule=diff
              - "{{ .base }}...HEAD"
  - name: implement
    description: Implements changes to a specific package.
    parameters:
      path:
        type: string
        description: A Go package directory (relative to the sandbox) or a Go import path.
        required: true
      instructions:
        type: string
        description: What to change and why. Include enough context for a new agent to update the package.
        required: true
    presenter:
      preset:
        name: subagent_q_and_a
        call_action: Implementing
        result_action: Implemented
        summary_items:
          - param: path
        call_body: instructions
        result_body: result
    subagent:
      name: package_mode_default_context
      package: path
      message: "{{ .instructions }}"

