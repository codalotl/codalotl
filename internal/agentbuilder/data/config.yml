---
agents:
  - name: generic
    prompts:
      - name: base
    tools:
      - read_file
      - ls
      - edit_files
      - shell
      - update_plan
    mode: generic
    skills: true
  - name: package_mode_no_context
    prompts:
      - name: package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - update_plan
      - diagnostics
      - fix_lints
      - run_tests
      - run_project_tests
      - module_info
      - get_public_api
      - clarify_public_api
      - get_usage
      - update_usage
      - change_api
    mode: package
    skills: true
  - name: package_mode_default_context
    prompts:
      - name: package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - update_plan
      - diagnostics
      - fix_lints
      - run_tests
      - run_project_tests
      - module_info
      - get_public_api
      - clarify_public_api
      - get_usage
      - update_usage
      - change_api
    mode: package
    include_package_mode_context: true
    skills: true
  - name: limited_package_mode
    prompts:
      - name: limited-package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - diagnostics
      - fix_lints
      - run_tests
      - get_public_api
      - clarify_public_api
    mode: package
    include_package_mode_context: true
    skills: true
  - name: pr-orchestrator
    prompts:
      - name: base
      - file: pr-orchestrator.prompt.md
    tools:
      - read_file
      - ls
      - shell
      - edit_files
      - update_plan
      - review
      - implement
    mode: generic
  
tools:
  - name: review
    description: |
      Reviews changes made vs some branch, and outputs a textual list of prioritized issues.
    parameters:
      base:
        type: string
        description: Branch to review against, often main or master.
        required: true
    command:
      cmd: codex
      args:
        - review
        - "--base"
        - "{{ .base }}"
  - name: implement
    description: Implements changes to a specific package.
    parameters:
      path:
        type: string
        description: A Go package directory (relative to the sandbox) or a Go import path.
        required: true
      instructions:
        type: string
        description: What to change and why. Include enough context for a new agent to update the package.
        required: true
    subagent:
      name: package_mode_default_context
      package: path
      message: "{{ .instructions }}"

