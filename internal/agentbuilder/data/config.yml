---
agents:
  - name: generic
    prompts:
      - name: base
    tools:
      - read_file
      - ls
      - edit_files
      - shell
      - update_plan
      - check_spec_conformance
    mode: generic
    skills: true
  - name: package_mode_no_context
    prompts:
      - name: package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - update_plan
      - diagnostics
      - fix_lints
      - run_tests
      - run_project_tests
      - module_info
      - get_public_api
      - clarify_public_api
      - get_usage
      - update_usage
      - change_api
    mode: package
    skills: true
  - name: package_mode_default_context
    prompts:
      - name: package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - update_plan
      - diagnostics
      - fix_lints
      - run_tests
      - run_project_tests
      - module_info
      - get_public_api
      - clarify_public_api
      - get_usage
      - update_usage
      - change_api
    mode: package
    include_package_mode_context: true
    skills: true
  - name: limited_package_mode
    prompts:
      - name: limited-package-base
    tools:
      - read_file
      - ls
      - edit_files
      - skill_shell
      - diagnostics
      - fix_lints
      - run_tests
      - get_public_api
      - clarify_public_api
    mode: package
    include_package_mode_context: true
    skills: true
  - name: pr-orchestrator
    prompts:
      - name: base
      - file: pr-orchestrator.prompt.md
    tools:
      - read_file
      - ls
      - shell
      - edit_files
      - update_plan
      - check_spec_conformance
      - review
      - implement
      - review_spec_changes
    mode: generic
    skills: true
  - name: pr-review
    prompts:
      - file: review.prompt.md
    tools:
      - read_file
      - ls
      - shell
    mode: generic
    skills: false
  
tools:
  - name: review
    description: |
      Reviews changes made vs some branch, and returns raw JSON findings plus an overall correctness verdict.
    parameters:
      base:
        type: string
        description: Branch to review against, often main or master.
        required: true
    presenter:
      preset:
        name: review
    subagent:
      name: pr-review
      result_format: json
      messages:
        - text: |
            Review the current branch against base ref `{{ .base }}`.

            Sandbox root: `{{ .sandbox_dir }}`.

            When you report a finding, `code_location.absolute_file_path` must be an absolute path under this sandbox. Diff paths are repo-relative, so join them to `{{ .sandbox_dir }}` when filling that field.

            The next messages contain, in order:
            1. Commit log since `{{ .base }}`.
            2. Diff stat vs `{{ .base }}`.
            3. Full diff vs `{{ .base }}`.

            Only report actionable bugs introduced by this diff. Return JSON that exactly matches your schema.
        - command:
            cmd: git
            args:
              - log
              - --oneline
              - --decorate
              - "{{ .base }}..HEAD"
        - command:
            cmd: git
            args:
              - diff
              - --stat
              - --find-renames
              - "{{ .base }}...HEAD"
        - command:
            cmd: git
            args:
              - diff
              - --find-renames
              - --submodule=diff
              - "{{ .base }}...HEAD"
  - name: implement
    description: Implements changes to a specific package.
    parameters:
      path:
        type: string
        description: A Go package directory (relative to the sandbox) or a Go import path.
        required: true
      instructions:
        type: string
        description: What to change and why. Include enough context for a new agent to update the package.
        required: true
    presenter:
      preset:
        name: subagent_q_and_a
        call_action: Implementing
        result_action: Implemented
        summary_items:
          - param: path
        call_body: instructions
        result_body: result
    subagent:
      name: package_mode_default_context
      package: path
      message: "{{ .instructions }}"
  - name: review_spec_changes
    description: Reviews the latest SPEC.md changes in a specific package and returns plain-text feedback. The SPEC.md changes can be an uncommitted edit to SPEC.md or the latest commit.
    parameters:
      package:
        type: string
        description: A Go package directory (relative to the sandbox) or a Go import path.
        required: true
      message:
        type: string
        description: "Context for the review request. Include: whether the SPEC.md changes to review are an uncommitted edit or something else; why you're making the change; if relevant, an @mention of the corresponding PR file; details of what needs to change in the package that aren't covered by the SPEC.md edits."
        required: true
    presenter:
      preset:
        name: subagent_q_and_a
        call_action: Reviewing SPEC changes in
        result_action: Reviewed SPEC changes in
        summary_items:
          - param: package
        call_body: message
        result_body: result
    subagent:
      name: limited_package_mode
      package: package
      message: |
        A user has made changes to the SPEC.md in your package (or created a new SPEC.md when none existed). Your job is to give feedback to the user
        about the changes they made. Do not make edits yourself; do not implement. NOTE: the edited SPEC.md likely precedes implementation - do not complain that the package's code does
        not implement the changes yet.

        First, read about SPEC.md files with the $spec-md skill. Then locate the user's changes - they might be an uncommitted edit or a recent commit to the SPEC.md.
        Use $spec-md and git to isolate the changes.

        The user's message below hopefully contains motivation, additional context, and some specifics about the intended changes.

        Later, when implementing these changes, your input will be the tuple (SPEC.md with edits, more details with more specific requirements). The SPEC.md edits are NOT intended to
        tell the whole story. The whole story is the tuple AND your judgement to fill in the missing details. It's very important to understand that not all details belong in the
        SPEC.md. Some belong in the supporting details, and some are best left unsaid because your judgement is excellent.

        Answer the following questions about the edits and the user's context. In your reply, repeat the question (but not examples/sub-bullets, if any), and then provide your answer.

        - Do you understand the changes to SPEC.md and the user's context? Are the changes logically coherent with the rest of the SPEC?

        - Are the changes implementable? Do you have any concerns about implementing them in this package?

        - Is there significant ambiguity where you don't know of any reasonable solution?
          - NOTE: consider both the SPEC.md AND the user's additional details.
          - Ambiguity is GOOD. Do NOT point out ambiguity just for the sake of it.
          - Do NOT report ambiguity where you can think of a reasonable solution.
          - ONLY report trap ambiguity.

        - Are the changes correctly located in this package? Or should they belong in an upstream package?

        - Are there non-timeless phrases in the SPEC.md edits?
          - Example 1: "don't do X anymore. Instead, do Y". This should usually just be, "do Y".
          - Example 2: "X continues to have property Y". This should either be "X has property Y", or if property Y was already established in prior versions, simply omitted.

        - What edits to the SPEC.md are too detailed or specific?
          - Reminder: SPEC.md is supposed to be concise and ambiguous.
          - LLMs who edit SPEC.md files are almost always too specific.
          - LLMs who edit SPEC.md files almost always edit SPEC.md files even for the tiniest of behavioral changes. These can often be dropped entirely.
          - SPEC.md files that are "in a good place" typically pick an elevation level and elide details below that.
          - Generally: do the edits vibe with the style and sensibilities of the existing SPEC.md file?
          - You can remind the user that some details can be part of the implementation instructions outside of the SPEC.md, and some details can be dropped entirely.

        - Is there opportunity to make the edits more concise?
          - Example 1: words or subphrases can often be deleted entirely with minimal loss of understanding.
          - Example 2: full sub-bullets can often be shorter parentheticals.

        User context:
        {{ .message }}
